<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="style.css">
    <title>JokenPô</title>
</head>
<body>
    <main>
        <section>
            <h1>JokenPô</h1>

            <div class="buttons">
                <button id="pedra" onclick="playH('pedra')">&#x1F44A;</button>
                <button id="papel" onclick="playH('papel')">&#x1f590;</button>
                <button id="tesoura" onclick="playH('tesoura')">&#x270c;</button>

            <p class="result"></p>
            <p class="your-score">Sua Pontuação: <i class="human-score">0</i></p>
            <p class="machine-score">Pontuação da Alexa: <i class="machin-score">0</i></p>
        </section>
    </main>
    <script src="script.js"></script>
